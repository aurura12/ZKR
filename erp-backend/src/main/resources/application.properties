# 邮件
spring.mail.host=${SPRING_MAIL_HOST:smtp.qq.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# RAG
finance.rag.enabled=${FINANCE_RAG_ENABLED:true}
finance.rag.base-url=${FINANCE_RAG_BASE_URL:http://localhost:36817}
finance.rag.index-name=${FINANCE_RAG_INDEX_NAME:finance-rag-index}
finance.rag.connect-timeout-seconds=${FINANCE_RAG_CONNECT_TIMEOUT_SECONDS:5}
finance.rag.request-timeout-seconds=${FINANCE_RAG_REQUEST_TIMEOUT_SECONDS:120}

# 钉钉
dingtalk.app-key=${DINGTALK_APP_KEY:}
dingtalk.app-secret=${DINGTALK_APP_SECRET:}

# 腾讯会议
