# 数据库配置（本地连接Docker的PostgreSQL）
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# JWT
jwt.secret=${JWT_SECRET:uihsadfkjnvzlksdjfiohouiyturydfhghjhkkb}

# 文件上传
app.uploads.dir=${APP_UPLOADS_DIR:./uploads}
spring.web.resources.static-locations=${SPRING_WEB_RESOURCES_STATIC_LOCATIONS:classpath:/static/,file:./uploads/}

# 账号域
auth.account-domain.finance.usernames=${AUTH_ACCOUNT_DOMAIN_FINANCE_USERNAMES:}
auth.provision.admin.user-id=${AUTH_PROVISION_ADMIN_USER_ID:}
